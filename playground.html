<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        iframe, canvas {
            margin: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Playground</h1>
    
    <!-- ...existing code... -->
    <!-- Embed YouTube video -->
    <iframe width="872" height="490" src="https://www.youtube.com/embed/_RxBRMcC378" title="Final Highlights | Coello/Tapia vs Chingotto/Galan | Riyadh P1 | English" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<!-- ...existing code... -->

    <!-- ...existing code... -->
    <!-- Embed Google Map of Babson Campus -->
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2948.1234567890123!2d-71.263!3d42.298!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89e37b1c12345678%3A0x1234567890abcdef!2sBabson%20College!5e0!3m2!1sen!2sus!4v1234567890" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>

    <div style="margin: 10px;">
        <button id="clearBtn">Clear Canvas</button>
        <label for="colorPicker">Color:</label>
        <input type="color" id="colorPicker" value="#000000">
        <label for="sizeSlider">Size:</label>
        <input type="range" id="sizeSlider" min="1" max="50" value="5">
    </div>

    <canvas id="myCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');

        // Set up drawing
        let drawing = false;

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
          
        });

        function startDrawing(e) {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!drawing) return;
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = sizeSlider.value;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function stopDrawing() {
            drawing = false;
        }

        // Initial rectangle (optional)
        ctx.fillStyle = 'lightblue';
        ctx.fillRect(50, 50, 200, 100);
    </script>
<!-- ...existing code... -->

</body>
</html>

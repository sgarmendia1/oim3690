<!DOCTYPE html>
<html lang="en">
<head>      
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S21 API Demo</title>
</head>
<body>
    <button>Click</button>
    <p id="result"></p>

    <button id="towns-btn">Show Towns</button>
    <button id="post-btn">Post Message</button>
    <p id="message-result"></p>
    <ul id="town-list"></ul>

<script>
    const button = document.querySelector("button");
    const result = document.querySelector("#result");
    const townsButton = document.querySelector("#towns-btn");
    const postButton = document.querySelector("#post-btn");
    const messageResult = document.querySelector("#message-result");
    const townList = document.querySelector("#town-list");

    async function getRandomword() {
        const response = await fetch('https://oim.108122.xyz/words/random');
        const word = await response.json();
        console.log(word);
        result.textContent = word;
    }

    async function showTowns() {
        const response = await fetch('https://oim.108122.xyz/mass');
        const data = await response.json();

        townList.innerHTML = '';

        for (const town of data.data.slice(0, 10)) {
            const li = document.createElement('li');
            li.textContent = `${town.name} (${town.county}) - pop ${town.population.toLocaleString()}`;
            townList.appendChild(li);
        }
    }

    async function postMessage(text) {
        const response = await fetch('https://oim.108122.xyz/message', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Token': 'santiagosantiago'
            },
            body: JSON.stringify({ message: text })
        });
        const result = await response.json();
        console.log(result);
        messageResult.textContent = JSON.stringify(result);
    }

    button.addEventListener('click', getRandomword);
    townsButton.addEventListener('click', showTowns);
    postButton.addEventListener('click', () => postMessage('Hello from Santiago!'));
</script>
</body>
</html>

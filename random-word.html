<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Word</title>
</head>
<body>
    <button id="get-word">Get Random Word</button>
    <p id="status"></p>
    <p id="word"></p>

    <script>
        const button = document.querySelector('#get-word');
        const status = document.querySelector('#status');
        const wordEl = document.querySelector('#word');

        async function getRandomWord() {
            status.textContent = 'Loading...';
            wordEl.textContent = '';

            try {
                const response = await fetch('https://oim.108122.xyz/words/random');
                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }
                const word = await response.json();
                wordEl.textContent = word;
                status.textContent = '';
            } catch (error) {
                status.textContent = 'Error loading word.';
                console.error(error);
            }
        }

        button.addEventListener('click', getRandomWord);
    </script>
</body>
</html>

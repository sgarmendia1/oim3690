<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Team Profiles</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 max-w-6xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6 text-center">
            <img src="images/member1.jpg" alt="Member 1" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">John Doe</h2>
            <p class="text-gray-600">Hobbies: Reading, Hiking, Cooking</p>
        </div>
        <div class="bg-white rounded-lg shadow-md p-6 text-center">
            <img src="images/member2.jpg" alt="Member 2" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Jane Smith</h2>
            <p class="text-gray-600">Hobbies: Painting, Yoga, Traveling</p>
        </div>
        <div class="bg-white rounded-lg shadow-md p-6 text-center">
            <img src="images/member3.jpg" alt="Member 3" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Bob Johnson</h2>
            <p class="text-gray-600">Hobbies: Gaming, Photography, Cycling</p>
        </div>
        <div class="bg-white rounded-lg shadow-md p-6 text-center">
            <img src="images/member4.jpg" alt="Member 4" class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Alice Brown</h2>
            <p class="text-gray-600">Hobbies: Music, Gardening, Swimming</p>
        </div>
    </div>
</body>
</html>
